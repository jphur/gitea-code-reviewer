name: AI Reviewer
on:
    pull_request:
        types: [review_requested]

jobs:
    ai-review:
        if: github.event.requested_reviewer.login == 'AI'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout código
              uses: actions/checkout@v3

            - name: Instalar Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: 22

            - name: Instalar dependencias
              run: npm install

            - name: Descargar Diff de la PR
              run: |
                  curl -L "${{ github.event.pull_request.html_url }}.diff" -o pr.diff

            - name: Ejecutar análisis con Gemini
              env:
                  GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GEMINIKEY }}
              run: npx tsx main.ts

            - name: Publicar comentario en Gitea
              run: |
                  RES=$(cat review_result.txt)
                  curl -X POST "${{ github.event.pull_request.comments_url }}" \
                    -H "Authorization: token ${{ secrets.GITEATOKEN }}" \
                    -H "Content-Type: application/json" \
                    -d "{\"body\": \"### 🤖 Reseña de IA\n\n$RES\"}"
